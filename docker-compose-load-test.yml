version: '3.8'

services:
  # ============================================================================
  # CORE SERVICES
  # ============================================================================

  # Main PostgreSQL for pgAnalytics metadata & monitoring data
  postgres:
    image: postgres:16-bullseye
    container_name: pganalytics-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pganalytics
      POSTGRES_DB: pganalytics
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
      - ./postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      pganalytics:
        ipv4_address: 172.20.0.10

  # TimescaleDB for time-series metrics storage
  timescale:
    image: postgres:16-bullseye
    container_name: pganalytics-timescale
    init: true
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pganalytics
      POSTGRES_DB: metrics
    ports:
      - "5433:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      pganalytics:
        ipv4_address: 172.20.0.11

  # Backend API Server
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: pganalytics-backend
    environment:
      DATABASE_URL: "postgres://postgres:pganalytics@postgres:5432/pganalytics?sslmode=disable"
      TIMESCALE_URL: "postgres://postgres:pganalytics@timescale:5432/metrics?sslmode=disable"
      JWT_SECRET: "demo-secret-key-change-in-production"
      JWT_EXPIRATION: "900"  # 15 minutes
      ENCRYPTION_KEY: "WkSMJvo2wKQ1FuceaE2yW2lEyxKIcJ1wfbrcNUOGUkE="  # 32-byte AES-256 key (base64 encoded)
      TLS_CERT: "/etc/pganalytics/tls/server.crt"
      TLS_KEY: "/etc/pganalytics/tls/server.key"
      LOG_LEVEL: "debug"
      PORT: "8080"
      REGISTRATION_SECRET: "${REGISTRATION_SECRET}"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      timescale:
        condition: service_healthy
    volumes:
      - ./backend/migrations:/migrations:ro
      - ./tls:/etc/pganalytics/tls:ro
    networks:
      pganalytics:
        ipv4_address: 172.20.0.20
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # React Frontend UI
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: pganalytics-frontend
    environment:
      VITE_API_BASE_URL: "http://backend:8080"
      VITE_API_BACKEND_HOST: "backend"
      VITE_API_BACKEND_PORT: "8080"
      VITE_API_BACKEND_PROTOCOL: "http"
    ports:
      - "4000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      pganalytics:
        ipv4_address: 172.20.0.60
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

