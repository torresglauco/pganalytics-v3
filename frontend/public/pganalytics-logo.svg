<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="256" height="256" fill="#F8F8F8"/>

  <!-- Head -->
  <rect x="64" y="60" width="128" height="100" fill="#1a1a3e" rx="8"/>

  <!-- Top Ears -->
  <rect x="68" y="50" width="24" height="20" fill="#1a1a3e"/>
  <rect x="164" y="50" width="24" height="20" fill="#1a1a3e"/>

  <!-- Eyes (left) -->
  <rect x="80" y="85" width="32" height="32" fill="#ffffff"/>
  <circle cx="96" cy="101" r="8" fill="#00d4ff"/>
  <circle cx="96" cy="101" r="4" fill="#1a1a3e"/>

  <!-- Eyes (right) -->
  <rect x="144" y="85" width="32" height="32" fill="#ffffff"/>
  <circle cx="160" cy="101" r="8" fill="#00d4ff"/>
  <circle cx="160" cy="101" r="4" fill="#1a1a3e"/>

  <!-- Mouth area -->
  <rect x="80" y="125" width="96" height="24" fill="#b8d5ff"/>

  <!-- Mouth -->
  <rect x="96" y="133" width="8" height="8" fill="#1a1a3e"/>
  <rect x="112" y="133" width="8" height="8" fill="#1a1a3e"/>
  <rect x="128" y="133" width="8" height="8" fill="#1a1a3e"/>

  <!-- Body -->
  <rect x="72" y="160" width="112" height="60" fill="#1a1a3e" rx="4"/>

  <!-- Orange accent top -->
  <rect x="88" y="155" width="80" height="12" fill="#ff6b35"/>

  <!-- Gradient colors (flame) -->
  <rect x="96" y="140" width="16" height="24" fill="#ff6b35"/>
  <rect x="128" y="140" width="16" height="24" fill="#ff6b35"/>
  <rect x="112" y="140" width="16" height="32" fill="#ff9500"/>

  <!-- Feet -->
  <rect x="88" y="220" width="16" height="16" fill="#ff6b35"/>
  <rect x="116" y="220" width="16" height="16" fill="#ff6b35"/>
  <rect x="144" y="220" width="16" height="16" fill="#ff6b35"/>

  <!-- Ground dots -->
  <circle cx="60" cy="235" r="4" fill="#b8d5ff"/>
  <circle cx="78" cy="240" r="3" fill="#b8d5ff"/>
  <circle cx="196" cy="235" r="4" fill="#b8d5ff"/>
  <circle cx="214" cy="240" r="3" fill="#b8d5ff"/>
</svg>
