## pgAnalytics v3 Development Environment Configuration
## Manage Go, Node, PostgreSQL versions and development tasks

[env]
# Development environment
ENVIRONMENT = "development"
DATABASE_URL = "postgres://postgres:postgres@localhost:5432/pganalytics_dev"
TEST_DATABASE_URL = "postgres://postgres:postgres@localhost:5432/pganalytics_test"
POSTGRES_DB = "pganalytics_dev"
POSTGRES_USER = "postgres"
POSTGRES_PASSWORD = "postgres"
POSTGRES_PORT = "5432"

# Go environment
GOPATH = "{{ env.HOME }}/.go"
GOROOT = "{{ env.HOME }}/.mise/installs/go/1.26.0"

# Node environment
NODE_ENV = "development"

# Cache settings
CACHE_ENABLED = "true"
CACHE_TTL = "3600"

# Feature flags
ML_SERVICE_ENABLED = "false"
LDAP_ENABLED = "false"
OAUTH_ENABLED = "false"
SAML_ENABLED = "false"

[tools]
# Go version for backend
go = "1.26.0"

# Node version for frontend
node = "20.0.0"
npm = "10.0.0"

# PostgreSQL version
postgresql = "15"

# Optional: Redis for caching
redis = "7"

# Optional: PostgreSQL CLI tools
postgres-contrib = "15"

[tasks]

## Setup Tasks

[tasks.setup]
description = "Complete development environment setup"
run = """
set -e
echo "======================================"
echo "pgAnalytics v3 Development Setup"
echo "======================================"

echo ""
echo "1. Installing Go dependencies..."
cd {{ env.PWD }}/backend
go mod download
go mod verify
echo "   ✓ Go dependencies installed"

echo ""
echo "2. Installing Node dependencies..."
cd {{ env.PWD }}/frontend
npm install
echo "   ✓ Node dependencies installed"

echo ""
echo "3. Checking PostgreSQL..."
if ! psql --version > /dev/null 2>&1; then
  echo "   ✗ PostgreSQL not found. Please install PostgreSQL 15"
  exit 1
fi
echo "   ✓ PostgreSQL is available"

echo ""
echo "4. Creating development database..."
createdb -U {{ env.POSTGRES_USER }} {{ env.POSTGRES_DB }} 2>/dev/null || echo "   ℹ Database already exists"
echo "   ✓ Database ready"

echo ""
echo "5. Running migrations..."
cd {{ env.PWD }}/backend
go run cmd/main.go migrate up || echo "   ℹ Migrations completed or already applied"
echo "   ✓ Schema ready"

echo ""
echo "======================================"
echo "✓ Setup Complete!"
echo "======================================"
echo ""
echo "Next steps:"
echo "  mise dev           # Start development environment"
echo "  mise test          # Run all tests"
echo "  mise db:reset      # Reset database"
"""

[tasks.install-tools]
description = "Install mise-managed tools"
run = """
set -e
echo "Installing Go, Node, PostgreSQL..."
mise install --all
echo "✓ All tools installed"
"""

## Testing Tasks

[tasks.test]
description = "Run all tests (unit + integration)"
run = """
set -e
cd {{ env.PWD }}/backend
echo "Running Go unit tests..."
go test ./... -v -short

cd {{ env.PWD }}/frontend
echo "Running frontend tests..."
npm test -- --run
"""

[tasks.test:unit]
description = "Run unit tests only"
run = """
set -e
cd {{ env.PWD }}/backend
go test ./... -v -short -skip TestIntegration
"""

[tasks.test:integration]
description = "Run integration tests (requires database)"
run = """
set -e
cd {{ env.PWD }}/backend
export DATABASE_URL="{{ env.DATABASE_URL }}"
export TEST_DATABASE_URL="{{ env.TEST_DATABASE_URL }}"
go test ./tests/integration -v
"""

[tasks.test:e2e]
description = "Run end-to-end integration tests"
run = """
set -e
echo "Starting backend for E2E tests..."
cd {{ env.PWD }}/backend
go run cmd/main.go migrate up
go run cmd/main.go serve > /tmp/backend.log 2>&1 &
BACKEND_PID=$!

echo "Waiting for backend to start..."
sleep 3

echo "Running E2E tests..."
go test ./tests/integration -v -run TestFull

# Cleanup
kill $BACKEND_PID 2>/dev/null || true
"""

[tasks.test:coverage]
description = "Run tests with coverage report"
run = """
set -e
cd {{ env.PWD }}/backend
go test ./... -cover -v -coverprofile=coverage.out
go tool cover -html=coverage.out -o coverage.html
echo "✓ Coverage report: coverage.html"
"""

## Database Tasks

[tasks.db:migrate]
description = "Run database migrations"
run = """
set -e
cd {{ env.PWD }}/backend
echo "Running migrations..."
go run cmd/main.go migrate up
echo "✓ Migrations complete"
"""

[tasks.db:migrate:down]
description = "Rollback database migrations"
run = """
set -e
cd {{ env.PWD }}/backend
echo "Rolling back migrations..."
go run cmd/main.go migrate down
echo "✓ Rollback complete"
"""

[tasks.db:seed]
description = "Load test data into database"
run = """
set -e
echo "Loading seed data..."
psql {{ env.DATABASE_URL }} < {{ env.PWD }}/backend/seeds/development.sql
echo "✓ Seed data loaded"
"""

[tasks.db:reset]
description = "Reset database (delete all data and restart)"
run = """
set -e
echo "Resetting database..."
dropdb -U {{ env.POSTGRES_USER }} {{ env.POSTGRES_DB }} 2>/dev/null || true
createdb -U {{ env.POSTGRES_USER }} {{ env.POSTGRES_DB }}
echo "✓ Database cleared"

echo "Running migrations..."
cd {{ env.PWD }}/backend
go run cmd/main.go migrate up
echo "✓ Fresh database ready"
"""

[tasks.db:status]
description = "Show database status"
run = """
echo "Database Status:"
echo "==============="
psql -U {{ env.POSTGRES_USER }} -d {{ env.POSTGRES_DB }} -c "SELECT datname, pg_database.datistemplate, pg_size_pretty(pg_database_size(datname)) FROM pg_database WHERE datname = '{{ env.POSTGRES_DB }}';"
echo ""
echo "Connected users:"
psql -U {{ env.POSTGRES_USER }} -d {{ env.POSTGRES_DB }} -c "SELECT count(*) as connection_count FROM pg_stat_activity WHERE datname = '{{ env.POSTGRES_DB }}';"
"""

## Development Tasks

[tasks.dev]
description = "Start development environment (backend + frontend)"
run = """
set -e
echo "Starting pgAnalytics v3 Development Environment"
echo "=============================================="

# Ensure database is ready
echo "Checking database..."
psql {{ env.DATABASE_URL }} -c "SELECT 1" > /dev/null 2>&1 || {
  echo "Database not available. Run 'mise setup' first."
  exit 1
}

# Start backend in background
echo ""
echo "Starting backend (port 8080)..."
cd {{ env.PWD }}/backend
go run cmd/main.go serve > /tmp/backend.log 2>&1 &
BACKEND_PID=$!
echo "✓ Backend started (PID: $BACKEND_PID)"

# Start frontend in background
echo ""
echo "Starting frontend (port 3000)..."
cd {{ env.PWD }}/frontend
npm run dev > /tmp/frontend.log 2>&1 &
FRONTEND_PID=$!
echo "✓ Frontend started (PID: $FRONTEND_PID)"

echo ""
echo "=============================================="
echo "Development environment ready!"
echo ""
echo "Frontend:  http://localhost:3000"
echo "Backend:   http://localhost:8080"
echo ""
echo "Logs:"
echo "  Backend:  tail -f /tmp/backend.log"
echo "  Frontend: tail -f /tmp/frontend.log"
echo ""
echo "Press Ctrl+C to stop all services"
echo ""

# Keep running
wait
"""

[tasks.dev:backend]
description = "Start only backend service"
run = """
set -e
cd {{ env.PWD }}/backend
echo "Starting backend on port 8080..."
go run cmd/main.go serve
"""

[tasks.dev:frontend]
description = "Start only frontend service"
run = """
set -e
cd {{ env.PWD }}/frontend
echo "Starting frontend on port 3000..."
npm run dev
"""

[tasks.dev:collector]
description = "Build and run the collector"
run = """
set -e
cd {{ env.PWD }}/collector
echo "Building collector..."
mkdir -p build
cd build
cmake ..
make
echo "✓ Collector built"
echo ""
echo "To run the collector:"
echo "  ./src/pganalytics-collector --config ../config.toml"
"""

## Build Tasks

[tasks.build]
description = "Build all components (backend + frontend)"
run = """
set -e
echo "Building backend..."
cd {{ env.PWD }}/backend
go build -o pganalytics-server cmd/main.go
echo "✓ Backend built: pganalytics-server"

echo ""
echo "Building frontend..."
cd {{ env.PWD }}/frontend
npm run build
echo "✓ Frontend built"
"""

[tasks.build:backend]
description = "Build backend binary only"
run = """
set -e
cd {{ env.PWD }}/backend
echo "Building backend..."
go build -o pganalytics-server cmd/main.go
echo "✓ Backend built: pganalytics-server"
"""

[tasks.build:frontend]
description = "Build frontend bundle only"
run = """
set -e
cd {{ env.PWD }}/frontend
echo "Building frontend..."
npm run build
echo "✓ Frontend built in dist/"
"""

[tasks.build:collector]
description = "Build collector"
run = """
set -e
cd {{ env.PWD }}/collector
mkdir -p build
cd build
cmake ..
make -j$(nproc)
echo "✓ Collector built"
"""

## Quality & Validation Tasks

[tasks.validate]
description = "Validate development environment setup"
run = """
set -e
echo "Validating Development Environment"
echo "==================================="

echo ""
echo "Checking Go..."
if ! command -v go &> /dev/null; then
  echo "✗ Go not found"
  exit 1
fi
go version
echo "✓ Go: OK"

echo ""
echo "Checking Node..."
if ! command -v node &> /dev/null; then
  echo "✗ Node not found"
  exit 1
fi
node --version
npm --version
echo "✓ Node: OK"

echo ""
echo "Checking PostgreSQL..."
if ! command -v psql &> /dev/null; then
  echo "✗ PostgreSQL not found"
  exit 1
fi
psql --version
echo "✓ PostgreSQL: OK"

echo ""
echo "Checking database connection..."
if psql {{ env.DATABASE_URL }} -c "SELECT 1" > /dev/null 2>&1; then
  echo "✓ Database connection: OK"
else
  echo "✗ Database connection failed"
  exit 1
fi

echo ""
echo "Checking backend dependencies..."
cd {{ env.PWD }}/backend
if ! go mod verify > /dev/null 2>&1; then
  echo "✗ Backend dependencies missing"
  exit 1
fi
echo "✓ Backend dependencies: OK"

echo ""
echo "Checking frontend dependencies..."
cd {{ env.PWD }}/frontend
if [ ! -d "node_modules" ]; then
  echo "✗ Frontend dependencies missing"
  exit 1
fi
echo "✓ Frontend dependencies: OK"

echo ""
echo "==================================="
echo "✓ Environment validated successfully!"
echo "==================================="
"""

[tasks.lint]
description = "Run linters and code quality checks"
run = """
set -e
echo "Running linters..."

echo ""
echo "Go linting..."
cd {{ env.PWD }}/backend
if command -v golangci-lint &> /dev/null; then
  golangci-lint run ./... || echo "Some linting issues found"
else
  echo "golangci-lint not installed, skipping Go linting"
fi

echo ""
echo "Frontend linting..."
cd {{ env.PWD }}/frontend
npm run lint || echo "Some linting issues found"

echo ""
echo "✓ Linting complete"
"""

[tasks.fmt]
description = "Format code (Go + JavaScript)"
run = """
set -e
echo "Formatting code..."

echo ""
echo "Go formatting..."
cd {{ env.PWD }}/backend
go fmt ./...
goimports -w .
echo "✓ Go code formatted"

echo ""
echo "JavaScript formatting..."
cd {{ env.PWD }}/frontend
npx prettier --write src/
echo "✓ JavaScript code formatted"
"""

## Utility Tasks

[tasks.logs]
description = "Tail development logs"
run = """
echo "Backend logs:"
tail -f /tmp/backend.log &
BACKEND_LOG=$!

echo ""
echo "Frontend logs:"
tail -f /tmp/frontend.log &
FRONTEND_LOG=$!

wait
"""

[tasks.stop]
description = "Stop all development services"
run = """
echo "Stopping services..."
pkill -f "go run cmd/main.go serve" || true
pkill -f "npm run dev" || true
echo "✓ Services stopped"
"""

[tasks.clean]
description = "Clean build artifacts and caches"
run = """
set -e
echo "Cleaning build artifacts..."

cd {{ env.PWD }}/backend
go clean
rm -f pganalytics-server
echo "✓ Backend cleaned"

cd {{ env.PWD }}/frontend
rm -rf node_modules dist
echo "✓ Frontend cleaned"

echo ""
echo "✓ Cleanup complete"
"""

[tasks.help]
description = "Show available commands"
run = """
echo "pgAnalytics v3 Development Commands"
echo "===================================="
echo ""
echo "Setup:"
echo "  mise setup         # Initialize development environment"
echo "  mise validate      # Validate setup"
echo ""
echo "Development:"
echo "  mise dev           # Start all services (backend + frontend)"
echo "  mise dev:backend   # Start backend only"
echo "  mise dev:frontend  # Start frontend only"
echo "  mise stop          # Stop all services"
echo ""
echo "Testing:"
echo "  mise test          # Run all tests"
echo "  mise test:unit     # Run unit tests"
echo "  mise test:integration  # Run integration tests (requires DB)"
echo "  mise test:e2e      # Run E2E tests"
echo "  mise test:coverage # Generate coverage report"
echo ""
echo "Database:"
echo "  mise db:migrate    # Run migrations"
echo "  mise db:seed       # Load test data"
echo "  mise db:reset      # Reset database"
echo "  mise db:status     # Show database status"
echo ""
echo "Building:"
echo "  mise build         # Build all (backend + frontend)"
echo "  mise build:backend # Build backend only"
echo "  mise build:frontend # Build frontend only"
echo ""
echo "Quality:"
echo "  mise lint          # Run linters"
echo "  mise fmt           # Format code"
echo "  mise validate      # Validate environment"
echo ""
echo "Utilities:"
echo "  mise logs          # Tail development logs"
echo "  mise clean         # Clean build artifacts"
"""
