version: 2

run:
  timeout: 5m
  modules-download-mode: readonly
  skip-dirs:
    - tools
    - backend/tests
    - backend/cmd

linters:
  # Enable essential linters for code quality
  enable:
    - govet         # Report suspicious constructs
    - ineffassign   # Detect unused assignments
    - misspell      # Find misspelled words

  # Disable linters with pre-existing issues (document for follow-up)
  # See: 02-01-SUMMARY.md for list of issues to address in future phases
  disable:
    - staticcheck   # 19 style/deprecation warnings
    - unused        # 17 unused field/function warnings (placeholder implementations)
    - errcheck      # Pre-existing unchecked errors
    - bodyclose     # Pre-existing body close issues
    - gosec         # Security audit needed
    - revive        # Style issues
    - sqlclosecheck # Pre-existing sql close issues

formatters:
  enable:
    - gofmt         # Check formatting
    - goimports     # Check imports

# Issues to address in future phases:
# - SA1019: io/ioutil deprecated (2 files)
# - SA1012: nil Context in crypto package (4 calls)
# - SA5011: nil pointer dereference in mfa_test.go
# - SA9003: empty branch in ldap_test.go
# - SA4031: nil check always true in phase5_integration_test.go
# - QF1003: could use tagged switch (3 files)
# - QF1001: De Morgan's law (2 files)
# - S1024: use time.Until instead of Sub
# - S1000: simple channel send/receive
# - ST1023: omit type in declaration
# - 17 unused fields/functions in placeholder implementations