## pgAnalytics v3 Development Environment Configuration
## Manage Go, Node, PostgreSQL versions and development tasks

[env]
# Development environment
ENVIRONMENT = "development"
DATABASE_URL = "postgres://postgres:postgres@localhost:5432/pganalytics_dev"
TEST_DATABASE_URL = "postgres://postgres:postgres@localhost:5432/pganalytics_test"
POSTGRES_DB = "pganalytics_dev"
POSTGRES_USER = "postgres"
POSTGRES_PASSWORD = "postgres"
POSTGRES_PORT = "5432"

# Go environment (Mise sets these automatically)
# GOPATH will default to ~/go
# GOROOT will be set by Mise

# Node environment
NODE_ENV = "development"

# Cache settings
CACHE_ENABLED = "true"
CACHE_TTL = "3600"

# Feature flags
ML_SERVICE_ENABLED = "false"
LDAP_ENABLED = "false"
OAUTH_ENABLED = "false"
SAML_ENABLED = "false"

[tools]
# Go version for backend
go = "1.26.0"

# Node version for frontend (npm is included with node)
node = "20.0.0"

# PostgreSQL version
postgres = "15"

# Optional: Redis for caching
redis = "7"

[tasks]

## Setup Tasks

[tasks.setup]
description = "Complete development environment setup"
run = """
set -e
echo "======================================"
echo "pgAnalytics v3 Development Setup"
echo "======================================"

echo ""
echo "1. Installing Go dependencies..."
cd {{ env.PWD }}/backend
go mod download
go mod verify
echo "   ✓ Go dependencies installed"

echo ""
echo "2. Installing Node dependencies..."
cd {{ env.PWD }}/frontend
npm install
echo "   ✓ Node dependencies installed"

echo ""
echo "3. Checking PostgreSQL..."
if ! psql --version > /dev/null 2>&1; then
  echo "   ✗ PostgreSQL not found. Please install PostgreSQL 15"
  exit 1
fi
echo "   ✓ PostgreSQL is available"

echo ""
echo "4. Creating development database..."
createdb -U {{ env.POSTGRES_USER }} {{ env.POSTGRES_DB }} 2>/dev/null || echo "   ℹ Database already exists"
echo "   ✓ Database ready"

echo ""
echo "5. Running migrations..."
cd {{ env.PWD }}/backend
go run cmd/main.go migrate up || echo "   ℹ Migrations completed or already applied"
echo "   ✓ Schema ready"

echo ""
echo "======================================"
echo "✓ Setup Complete!"
echo "======================================"
echo ""
echo "Next steps:"
echo "  mise dev           # Start development environment"
echo "  mise test          # Run all tests"
echo "  mise db:reset      # Reset database"
"""

[tasks.install-tools]
description = "Install mise-managed tools"
run = """
set -e
echo "Installing Go, Node, PostgreSQL..."
mise install --all
echo "✓ All tools installed"
"""

## Testing Tasks

[tasks.test]
description = "Run all tests (unit, integration, e2e)"
run = """
set -e
echo "=== Running All Tests ==="
echo ""
echo "Backend tests..."
cd {{ env.PWD }}/backend
go test ./... -v -cover -timeout 60s || echo "Backend tests completed with status"

echo ""
echo "Frontend tests..."
cd {{ env.PWD }}/frontend
npm test -- --run --coverage --passWithNoTests || echo "Frontend tests completed with status"

echo ""
echo "✓ All tests complete"
"""

[tasks."test:backend"]
description = "Run all backend Go tests"
run = """
set -e
cd {{ env.PWD }}/backend
echo "Running all backend tests..."
go test ./... -v -cover -timeout 60s
"""

[tasks."test:backend:unit"]
description = "Run backend unit tests only"
run = """
set -e
cd {{ env.PWD }}/backend
echo "Running backend unit tests..."
go test ./... -v -short -timeout 30s -skip TestIntegration
"""

[tasks."test:backend:integration"]
description = "Run backend integration tests"
run = """
set -e
cd {{ env.PWD }}/backend
echo "Running backend integration tests..."
export DATABASE_URL="{{ env.DATABASE_URL }}"
export TEST_DATABASE_URL="{{ env.TEST_DATABASE_URL }}"
go test ./tests/integration/... -v -timeout 120s
"""

[tasks."test:unit"]
description = "Run unit tests only"
run = """
set -e
cd {{ env.PWD }}/backend
go test ./... -v -short -skip TestIntegration -timeout 30s
"""

[tasks."test:integration"]
description = "Run integration tests (requires database)"
run = """
set -e
cd {{ env.PWD }}/backend
export DATABASE_URL="{{ env.DATABASE_URL }}"
export TEST_DATABASE_URL="{{ env.TEST_DATABASE_URL }}"
go test ./tests/integration -v -timeout 120s
"""

[tasks."test:cli"]
description = "Run CLI tests"
run = """
set -e
cd {{ env.PWD }}/backend
echo "Running CLI tests..."
go test ./cmd/pganalytics-cli/... -v -timeout 30s
"""

[tasks."test:e2e"]
description = "Run end-to-end integration tests"
run = """
set -e
echo "Starting backend for E2E tests..."
cd {{ env.PWD }}/backend
go run cmd/main.go migrate up
go run cmd/main.go serve > /tmp/backend.log 2>&1 &
BACKEND_PID=$!

echo "Waiting for backend to start..."
sleep 3

echo "Running E2E tests..."
go test ./tests/integration -v -run TestFull -timeout 300s

# Cleanup
kill $BACKEND_PID 2>/dev/null || true
"""

[tasks."test:coverage"]
description = "Run tests with coverage report"
run = """
set -e
cd {{ env.PWD }}/backend
go test ./... -cover -v -coverprofile=coverage.out -timeout 60s
go tool cover -html=coverage.out -o coverage.html
echo "✓ Coverage report: coverage.html"
"""

[tasks."test:frontend"]
description = "Run frontend tests (unit + e2e)"
run = """
set -e
cd {{ env.PWD }}/frontend
echo "Running frontend tests..."
npm test -- --run --coverage --passWithNoTests
"""

[tasks."test:frontend:unit"]
description = "Run frontend unit tests only"
run = """
set -e
cd {{ env.PWD }}/frontend
echo "Running frontend unit tests..."
npm test -- --run --coverage --passWithNoTests
"""

[tasks."test:frontend:e2e"]
description = "Run frontend E2E tests"
run = """
set -e
cd {{ env.PWD }}/frontend
echo "Running frontend E2E tests..."
npm run test:e2e || echo "E2E tests not configured"
"""

[tasks."test:collector"]
description = "Run collector tests"
run = """
cd {{ env.PWD }}/collector && cmake --build build --target test 2>/dev/null || echo "Collector tests not configured"
"""

## Database Tasks

[tasks."db:migrate"]
description = "Run database migrations"
run = """
set -e
cd {{ env.PWD }}/backend
echo "Running migrations..."
go run cmd/main.go migrate up
echo "✓ Migrations complete"
"""

[tasks."db:migrate:down"]
description = "Rollback database migrations"
run = """
set -e
cd {{ env.PWD }}/backend
echo "Rolling back migrations..."
go run cmd/main.go migrate down
echo "✓ Rollback complete"
"""

[tasks."db:seed"]
description = "Load test data into database"
run = """
set -e
echo "Loading seed data..."
psql {{ env.DATABASE_URL }} < {{ env.PWD }}/backend/seeds/development.sql
echo "✓ Seed data loaded"
"""

[tasks."db:reset"]
description = "Reset database (delete all data and restart)"
run = """
set -e
echo "Resetting database..."
dropdb -U {{ env.POSTGRES_USER }} {{ env.POSTGRES_DB }} 2>/dev/null || true
createdb -U {{ env.POSTGRES_USER }} {{ env.POSTGRES_DB }}
echo "✓ Database cleared"

echo "Running migrations..."
cd {{ env.PWD }}/backend
go run cmd/main.go migrate up
echo "✓ Fresh database ready"
"""

[tasks."db:status"]
description = "Show database status"
run = """
echo "Database Status:"
echo "==============="
psql -U {{ env.POSTGRES_USER }} -d {{ env.POSTGRES_DB }} -c "SELECT datname, pg_database.datistemplate, pg_size_pretty(pg_database_size(datname)) FROM pg_database WHERE datname = '{{ env.POSTGRES_DB }}';"
echo ""
echo "Connected users:"
psql -U {{ env.POSTGRES_USER }} -d {{ env.POSTGRES_DB }} -c "SELECT count(*) as connection_count FROM pg_stat_activity WHERE datname = '{{ env.POSTGRES_DB }}';"
"""

## PostgreSQL Version Compatibility Tasks

[tasks."test:postgres:compatibility"]
description = "Test migrations against all supported PostgreSQL versions (14-18)"
run = """
set -e
echo "Testing pgAnalytics against all PostgreSQL versions (14-18)"
echo "==========================================================="
echo ""

for VERSION in 14 15 16 17 18; do
  echo "Testing PostgreSQL $VERSION..."

  # Create version-specific test database
  TEST_DB="pganalytics_test_pg${VERSION}"

  # Drop if exists
  dropdb -U {{ env.POSTGRES_USER }} "$TEST_DB" 2>/dev/null || true

  # Create test database
  createdb -U {{ env.POSTGRES_USER }} "$TEST_DB"

  # Run migrations
  export DATABASE_URL="postgres://{{ env.POSTGRES_USER }}:{{ env.POSTGRES_PASSWORD }}@localhost:5432/$TEST_DB"
  cd {{ env.PWD }}/backend

  if go run cmd/main.go migrate up >/dev/null 2>&1; then
    echo "  ✓ PostgreSQL $VERSION: All migrations applied successfully"
  else
    echo "  ✗ PostgreSQL $VERSION: Migration failed"
    dropdb -U {{ env.POSTGRES_USER }} "$TEST_DB"
    exit 1
  fi

  # Verify schema integrity
  TABLES=$(psql -U {{ env.POSTGRES_USER }} -d "$TEST_DB" -t -c "SELECT count(*) FROM information_schema.tables WHERE table_schema = 'pganalytics';")
  echo "  ✓ PostgreSQL $VERSION: Schema verified ($TABLES tables)"

  # Cleanup
  dropdb -U {{ env.POSTGRES_USER }} "$TEST_DB"
done

echo ""
echo "==========================================================="
echo "✓ All PostgreSQL versions (14-18) compatibility verified!"
echo "==========================================================="
"""

[tasks."test:postgres:14"]
description = "Test migrations against PostgreSQL 14 (minimum supported version)"
