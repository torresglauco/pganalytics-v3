name: Frontend Code Quality

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-quality.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-quality.yml'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

      - name: Report lint issues
        if: failure()
        run: echo "❌ Lint check failed - please fix linting errors"

  type-check:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Run TypeScript type check
        working-directory: frontend
        run: npm run type-check

      - name: Report type check issues
        if: failure()
        run: echo "❌ Type check failed - please fix TypeScript errors"

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Run unit tests
        working-directory: frontend
        run: npm test

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: frontend/coverage/
          retention-days: 30

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build production bundle
        working-directory: frontend
        run: npm run build

      - name: Check bundle size
        working-directory: frontend
        run: |
          SIZE=$(du -sh dist | cut -f1)
          echo "📦 Production build size: $SIZE"
          # Warn if bundle is larger than 500KB
          BYTES=$(du -sb dist | cut -f1)
          if [ $BYTES -gt 524288 ]; then
            echo "⚠️  Warning: Bundle size exceeds 500KB"
          fi

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 7

  summary:
    name: Quality Check Summary
    runs-on: ubuntu-latest
    needs: [lint, type-check, unit-tests, build]
    if: always()

    steps:
      - name: Check all quality checks
        run: |
          echo "Frontend Code Quality Summary"
          echo "=============================="
          echo "Lint: ${{ needs.lint.result }}"
          echo "Type Check: ${{ needs.type-check.result }}"
          echo "Unit Tests: ${{ needs.unit-tests.result }}"
          echo "Build: ${{ needs.build.result }}"

          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.type-check.result }}" != "success" ] || \
             [ "${{ needs.unit-tests.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ]; then
            echo "❌ Some quality checks failed"
            exit 1
          else
            echo "✅ All quality checks passed"
          fi
