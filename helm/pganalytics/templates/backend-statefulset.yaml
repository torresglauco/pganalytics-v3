{{- if .Values.backend.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "pganalytics.fullname" . }}-backend
  namespace: {{ include "pganalytics.namespace" . }}
  labels:
    {{- include "pganalytics.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  serviceName: {{ include "pganalytics.fullname" . }}-backend
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      {{- include "pganalytics.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "pganalytics.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      {{- with .Values.backend.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "pganalytics.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.backend.securityContext | nindent 8 }}
      initContainers:
        - name: wait-for-postgresql
          image: busybox:1.35
          command:
            - 'sh'
            - '-c'
            - |
              # Wait for PostgreSQL failover service
              until nc -z {{ include "pganalytics.fullname" . }}-postgresql-readwrite.{{ include "pganalytics.namespace" . }}.svc.cluster.local {{ .Values.postgresql.service.port | default 5432 }}; do
                echo "waiting for postgresql primary..."
                sleep 2
              done
              echo "PostgreSQL is ready"
        - name: migrate-database
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          command: ["/app/pganalytics", "migrate", "up"]
          env:
            {{- toYaml .Values.backend.env | nindent 12 }}
      containers:
        - name: backend
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.backend.service.targetPort }}
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          livenessProbe:
            {{- toYaml .Values.backend.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.backend.readinessProbe | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.backend.startupProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          env:
            {{- toYaml .Values.backend.env | nindent 12 }}
            # Database connection pooling for HA
            - name: DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@{{ include "pganalytics.fullname" . }}-postgresql-readwrite.{{ include "pganalytics.namespace" . }}.svc.cluster.local:5432/pganalytics"
            - name: MAX_DATABASE_CONNS
              value: "{{ .Values.postgresql.connectionPool.maxOpenConns | default 100 }}"
            - name: MAX_IDLE_DATABASE_CONNS
              value: "{{ .Values.postgresql.connectionPool.maxIdleConns | default 20 }}"
            - name: DATABASE_CONN_MAX_LIFETIME
              value: "{{ .Values.postgresql.connectionPool.connMaxLifetime | default "15m" }}"
            # Redis session store with failover
            - name: REDIS_URL
              value: "redis://{{ include "pganalytics.fullname" . }}-redis-master.{{ include "pganalytics.namespace" . }}.svc.cluster.local:6379/0"
            - name: REDIS_SENTINEL_ADDRS
              value: "{{ include "pganalytics.fullname" . }}-redis-sentinel-client.{{ include "pganalytics.namespace" . }}.svc.cluster.local:26379"
            - name: REDIS_SENTINEL_MASTER_NAME
              value: "{{ include "pganalytics.fullname" . }}-redis-master"
            - name: SESSION_STORE_TYPE
              value: "redis"
            - name: SESSION_TTL_SECONDS
              value: "{{ .Values.redis.sessionStore.ttl | default 86400 }}"
          # Graceful shutdown lifecycle
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    # Signal readiness probe to fail (stop accepting new requests)
                    touch /tmp/graceful-shutdown
                    echo "Starting graceful shutdown (30s timeout)..."
                    # Wait for existing requests to complete
                    sleep 25
                    # Close connections
                    kill -TERM 1 || true
                    # Final wait for process termination
                    sleep 5
          volumeMounts:
            {{- toYaml .Values.backend.volumeMounts | nindent 12 }}
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: {{ include "pganalytics.fullname" . }}-backend-config
        - name: tls-certs
          secret:
            secretName: {{ include "pganalytics.fullname" . }}-tls
            defaultMode: 0400
        - name: tmp
          emptyDir: {}

      # Graceful shutdown timeout (must be >= preStop duration)
      terminationGracePeriodSeconds: 40

      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
