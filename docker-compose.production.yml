version: '3.9'

services:
  # ==================== MAIN PGANALYTICS INFRASTRUCTURE ====================

  # Main PostgreSQL for pgAnalytics metadata & monitoring data
  postgres:
    image: postgres:16-bullseye
    container_name: pganalytics-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pganalytics
      POSTGRES_DB: pganalytics
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
      - ./backend/migrations/003_query_stats.sql:/docker-entrypoint-initdb.d/003_query_stats.sql:ro
      - ./backend/migrations/006_managed_instance_monitoring.sql:/docker-entrypoint-initdb.d/006_managed_instance_monitoring.sql:ro
      - ./backend/migrations/007_managed_instance_status.sql:/docker-entrypoint-initdb.d/007_managed_instance_status.sql:ro
      - ./backend/migrations/008_managed_instance_clusters.sql:/docker-entrypoint-initdb.d/008_managed_instance_clusters.sql:ro
      - ./backend/migrations/009_rename_rds_to_managed_instance.sql:/docker-entrypoint-initdb.d/009_rename_rds_to_managed_instance.sql:ro
      - ./backend/migrations/010_registration_secrets.sql:/docker-entrypoint-initdb.d/010_registration_secrets.sql:ro
      - ./postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      pganalytics:
        ipv4_address: 172.20.0.10

  # TimescaleDB for time-series metrics storage
  timescale:
    image: postgres:16-bullseye
    container_name: pganalytics-timescale
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pganalytics
      POSTGRES_DB: metrics
    ports:
      - "5433:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      pganalytics:
        ipv4_address: 172.20.0.11

  # Backend API Server
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: pganalytics-backend
    environment:
      DATABASE_URL: "postgres://postgres:pganalytics@postgres:5432/pganalytics?sslmode=disable"
      TIMESCALE_URL: "postgres://postgres:pganalytics@timescale:5432/metrics?sslmode=disable"
      JWT_SECRET: "demo-secret-key-change-in-production"
      JWT_EXPIRATION: "900"
      ENCRYPTION_KEY: "WkSMJvo2wKQ1FuceaE2yW2lEyxKIcJ1wfbrcNUOGUkE="
      TLS_CERT: "/etc/pganalytics/tls/server.crt"
      TLS_KEY: "/etc/pganalytics/tls/server.key"
      LOG_LEVEL: "debug"
      PORT: "8080"
      REGISTRATION_SECRET: "demo-registration-secret-change-in-production"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      timescale:
        condition: service_healthy
    volumes:
      - ./backend/migrations:/migrations:ro
      - ./tls:/etc/pganalytics/tls:ro
    networks:
      pganalytics:
        ipv4_address: 172.20.0.20
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # React Frontend UI
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: pganalytics-frontend
    environment:
      VITE_API_BASE_URL: "http://backend:8080"
      VITE_API_BACKEND_HOST: "backend"
      VITE_API_BACKEND_PORT: "8080"
      VITE_API_BACKEND_PROTOCOL: "http"
    ports:
      - "4000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      pganalytics:
        ipv4_address: 172.20.0.60
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # Grafana for Dashboards & Alerts
  grafana:
    image: grafana/grafana:11.0.0
    container_name: pganalytics-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: Th101327!!!
      GF_INSTALL_PLUGINS: "grafana-piechart-panel,grafana-worldmap-panel"
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      timescale:
        condition: service_healthy
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      pganalytics:
        ipv4_address: 172.20.0.40
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ==================== PRODUCTION DATABASES (5x) ====================

  # Database 1: Production Database
  db-prod-01:
    image: postgres:16-bullseye
    container_name: pganalytics-db-prod-01
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: prod123
      POSTGRES_DB: production
    ports:
      - "5441:5432"
    volumes:
      - db_prod_01_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      pganalytics:
        ipv4_address: 172.20.0.101

  # Database 2: Staging Database
  db-staging-01:
    image: postgres:16-bullseye
    container_name: pganalytics-db-staging-01
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: staging123
      POSTGRES_DB: staging
    ports:
      - "5442:5432"
    volumes:
      - db_staging_01_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      pganalytics:
        ipv4_address: 172.20.0.102

  # Database 3: Development Database
  db-dev-01:
    image: postgres:16-bullseye
    container_name: pganalytics-db-dev-01
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dev123
      POSTGRES_DB: development
    ports:
      - "5443:5432"
    volumes:
      - db_dev_01_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      pganalytics:
        ipv4_address: 172.20.0.103

  # Database 4: Analytics Database
  db-analytics-01:
    image: postgres:16-bullseye
    container_name: pganalytics-db-analytics-01
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: analytics123
      POSTGRES_DB: analytics
    ports:
      - "5444:5432"
    volumes:
      - db_analytics_01_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      pganalytics:
        ipv4_address: 172.20.0.104

  # Database 5: Archive Database
  db-archive-01:
    image: postgres:16-bullseye
    container_name: pganalytics-db-archive-01
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: archive123
      POSTGRES_DB: archive
    ports:
      - "5445:5432"
    volumes:
      - db_archive_01_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      pganalytics:
        ipv4_address: 172.20.0.105

  # ==================== COLLECTORS FOR EACH DATABASE ====================

  # Collector 1: Production Database Collector
  collector-prod-01:
    build:
      context: .
      dockerfile: collector/Dockerfile
    container_name: pganalytics-collector-prod-01
    environment:
      COLLECTOR_ID: "col_prod_001"
      COLLECTOR_NAME: "Production DB Collector"
      BACKEND_URL: "http://backend:8080"
      BACKEND_TLS_VERIFY: "false"
      POSTGRES_HOST: "db-prod-01"
      POSTGRES_PORT: "5432"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "prod123"
      POSTGRES_DATABASES: "production"
      COLLECTION_INTERVAL: "30"
      LOG_LEVEL: "debug"
      AUTO_REGISTER: "true"
      REGISTRATION_SECRET: "demo-registration-secret-change-in-production"
    depends_on:
      db-prod-01:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - ./tls:/etc/pganalytics/tls:ro
      - collector_prod_01_data:/var/lib/pganalytics
    networks:
      pganalytics:
        ipv4_address: 172.20.0.201

  # Collector 2: Staging Database Collector
  collector-staging-01:
    build:
      context: .
      dockerfile: collector/Dockerfile
    container_name: pganalytics-collector-staging-01
    environment:
      COLLECTOR_ID: "col_staging_001"
      COLLECTOR_NAME: "Staging DB Collector"
      BACKEND_URL: "http://backend:8080"
      BACKEND_TLS_VERIFY: "false"
      POSTGRES_HOST: "db-staging-01"
      POSTGRES_PORT: "5432"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "staging123"
      POSTGRES_DATABASES: "staging"
      COLLECTION_INTERVAL: "30"
      LOG_LEVEL: "debug"
      AUTO_REGISTER: "true"
      REGISTRATION_SECRET: "demo-registration-secret-change-in-production"
    depends_on:
      db-staging-01:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - ./tls:/etc/pganalytics/tls:ro
      - collector_staging_01_data:/var/lib/pganalytics
    networks:
      pganalytics:
        ipv4_address: 172.20.0.202

  # Collector 3: Development Database Collector
  collector-dev-01:
    build:
      context: .
      dockerfile: collector/Dockerfile
    container_name: pganalytics-collector-dev-01
    environment:
      COLLECTOR_ID: "col_dev_001"
      COLLECTOR_NAME: "Development DB Collector"
      BACKEND_URL: "http://backend:8080"
      BACKEND_TLS_VERIFY: "false"
      POSTGRES_HOST: "db-dev-01"
      POSTGRES_PORT: "5432"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "dev123"
      POSTGRES_DATABASES: "development"
      COLLECTION_INTERVAL: "30"
      LOG_LEVEL: "debug"
      AUTO_REGISTER: "true"
      REGISTRATION_SECRET: "demo-registration-secret-change-in-production"
    depends_on:
      db-dev-01:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - ./tls:/etc/pganalytics/tls:ro
      - collector_dev_01_data:/var/lib/pganalytics
    networks:
      pganalytics:
        ipv4_address: 172.20.0.203

  # Collector 4: Analytics Database Collector
  collector-analytics-01:
    build:
      context: .
      dockerfile: collector/Dockerfile
    container_name: pganalytics-collector-analytics-01
    environment:
      COLLECTOR_ID: "col_analytics_001"
      COLLECTOR_NAME: "Analytics DB Collector"
      BACKEND_URL: "http://backend:8080"
      BACKEND_TLS_VERIFY: "false"
      POSTGRES_HOST: "db-analytics-01"
      POSTGRES_PORT: "5432"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "analytics123"
      POSTGRES_DATABASES: "analytics"
      COLLECTION_INTERVAL: "30"
      LOG_LEVEL: "debug"
      AUTO_REGISTER: "true"
      REGISTRATION_SECRET: "demo-registration-secret-change-in-production"
    depends_on:
      db-analytics-01:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - ./tls:/etc/pganalytics/tls:ro
      - collector_analytics_01_data:/var/lib/pganalytics
    networks:
      pganalytics:
        ipv4_address: 172.20.0.204

  # Collector 5: Archive Database Collector
  collector-archive-01:
    build:
      context: .
      dockerfile: collector/Dockerfile
    container_name: pganalytics-collector-archive-01
    environment:
      COLLECTOR_ID: "col_archive_001"
      COLLECTOR_NAME: "Archive DB Collector"
      BACKEND_URL: "http://backend:8080"
      BACKEND_TLS_VERIFY: "false"
      POSTGRES_HOST: "db-archive-01"
      POSTGRES_PORT: "5432"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "archive123"
      POSTGRES_DATABASES: "archive"
      COLLECTION_INTERVAL: "30"
      LOG_LEVEL: "debug"
      AUTO_REGISTER: "true"
      REGISTRATION_SECRET: "demo-registration-secret-change-in-production"
    depends_on:
      db-archive-01:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - ./tls:/etc/pganalytics/tls:ro
      - collector_archive_01_data:/var/lib/pganalytics
    networks:
      pganalytics:
        ipv4_address: 172.20.0.205

networks:
  pganalytics:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1

volumes:
  postgres_data:
    driver: local
  timescale_data:
    driver: local
  grafana_data:
    driver: local
  db_prod_01_data:
    driver: local
  db_staging_01_data:
    driver: local
  db_dev_01_data:
    driver: local
  db_analytics_01_data:
    driver: local
  db_archive_01_data:
    driver: local
  collector_prod_01_data:
    driver: local
  collector_staging_01_data:
    driver: local
  collector_dev_01_data:
    driver: local
  collector_analytics_01_data:
    driver: local
  collector_archive_01_data:
    driver: local
