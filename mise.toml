[tools]
node = "18"
go = "1.24"

[tasks.setup]
description = "Bootstrap the project for local development"
run = "bash scripts/setup.sh"

[tasks.dev]
description = "Start all services for development"
run = """
docker compose up --build -d
echo ""
echo "Waiting for services to be healthy..."
echo ""
timeout=120
elapsed=0
while [ $elapsed -lt $timeout ]; do
  # Check backend health via HTTP (works with Docker and Podman)
  if curl -sf http://localhost:8080/api/v1/health > /dev/null 2>&1; then
    break
  fi
  sleep 3
  elapsed=$((elapsed + 3))
done

if [ $elapsed -ge $timeout ]; then
  echo "WARNING: Services may not be fully healthy yet."
  echo "Check logs with: mise run logs"
else
  echo "==================================="
  echo " pgAnalytics is running!"
  echo "==================================="
  echo ""
  echo " Frontend:  http://localhost:3000"
  echo " API:       http://localhost:8080"
  echo " Grafana:   http://localhost:3001"
  echo ""
  echo " Use 'mise run logs' to follow logs"
  echo " Use 'mise run down' to stop"
  echo "==================================="
fi
"""

[tasks.dev-frontend]
description = "Start frontend in dev mode (hot reload)"
dir = "frontend"
run = "npm run dev"

[tasks.down]
description = "Stop all services"
run = "docker compose down"

[tasks.logs]
description = "Follow logs from all services"
run = "docker compose logs -f"

[tasks.reset]
description = "Stop services, remove volumes, and start fresh"
run = """
echo "This will delete all local data (databases, grafana, etc.)"
read -p "Are you sure? [y/N] " confirm
if [ "$confirm" = "y" ] || [ "$confirm" = "Y" ]; then
  docker compose down -v
  echo "Volumes removed. Run 'mise run setup && mise run dev' to start fresh."
else
  echo "Cancelled."
fi
"""

[tasks.lint]
description = "Run linters for frontend"
dir = "frontend"
run = "npm run lint"

[tasks.test]
description = "Run tests for frontend"
dir = "frontend"
run = "npm run test"

[tasks.typecheck]
description = "Run TypeScript type checking"
dir = "frontend"
run = "npm run type-check"

[tasks.ps]
description = "Show status of all services"
run = "docker compose ps"

[tasks.staging]
description = "Setup and start complete staging environment with all services"
run = """
set -e

echo "🚀 Starting Staging Environment Setup..."
echo ""

# Step 1: Install tools
echo "📦 Installing tools with Mise..."
mise install
echo "✅ Tools installed"
echo ""

# Step 2: Setup project
echo "🔧 Setting up project..."
mise run setup
echo "✅ Project setup complete"
echo ""

# Step 3: Build and start services
echo "🐳 Building and starting Docker services..."
mise run dev
echo ""

# Step 4: Verify deployment
echo "✅ Staging environment is ready!"
echo ""
echo "Access points:"
echo "  Frontend:  http://localhost:3000"
echo "  API:       http://localhost:8080"
echo "  Grafana:   http://localhost:3001"
echo "  Health:    http://localhost:8080/api/v1/health"
"""

[tasks.staging-logs]
description = "Follow staging environment logs"
run = "docker compose logs -f"

[tasks.staging-status]
description = "Show staging environment status"
run = """
echo "=== Staging Services Status ==="
mise run ps
echo ""
echo "=== Network Status ==="
docker network ls | grep pganalytics || echo "Network not found"
echo ""
echo "=== Services Health Check ==="
curl -s http://localhost:8080/api/v1/health | jq . || echo "Backend not responding"
"""

[tasks.staging-stop]
description = "Stop staging environment"
run = "docker compose down"

[tasks.staging-clean]
description = "Clean staging environment (remove volumes)"
run = """
echo "⚠️  This will delete all staging data (databases, volumes, etc.)"
read -p "Are you sure? [y/N] " confirm
if [ "$confirm" = "y" ] || [ "$confirm" = "Y" ]; then
  docker compose down -v
  echo "✅ Staging environment cleaned"
else
  echo "❌ Cancelled"
fi
"""

[tasks.staging-validate]
description = "Validate staging environment"
run = """
echo "🔍 Validating Staging Environment..."
echo ""

# Check services
echo "✓ Checking services..."
BACKEND_HEALTH=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/v1/health)
if [ "$BACKEND_HEALTH" = "200" ]; then
  echo "  ✅ Backend API: Healthy"
else
  echo "  ❌ Backend API: Unhealthy (HTTP $BACKEND_HEALTH)"
fi

FRONTEND_HEALTH=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000)
if [ "$FRONTEND_HEALTH" = "200" ]; then
  echo "  ✅ Frontend UI: Healthy"
else
  echo "  ❌ Frontend UI: Unhealthy (HTTP $FRONTEND_HEALTH)"
fi

GRAFANA_HEALTH=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/api/health)
if [ "$GRAFANA_HEALTH" = "200" ]; then
  echo "  ✅ Grafana: Healthy"
else
  echo "  ❌ Grafana: Unhealthy (HTTP $GRAFANA_HEALTH)"
fi

# Check Docker containers
echo ""
echo "✓ Checking containers..."
TOTAL=$(docker compose ps -q | wc -l)
RUNNING=$(docker compose ps --filter "status=running" -q | wc -l)
echo "  Containers: $RUNNING/$TOTAL running"

# Check request IDs
echo ""
echo "✓ Checking request tracing..."
REQUEST_ID=$(curl -s -i http://localhost:8080/api/v1/health 2>&1 | grep -i "x-request-id" | cut -d' ' -f2 | tr -d '\r')
if [ -n "$REQUEST_ID" ]; then
  echo "  ✅ Request ID: $REQUEST_ID"
else
  echo "  ❌ Request ID: Not found"
fi

echo ""
echo "✅ Staging environment validation complete!"
"""
