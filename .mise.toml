## Development Tasks

[tasks.dev]
description = "Start development environment (backend + frontend)"
run = """
set -e
echo "Starting pgAnalytics v3 Development Environment"
echo "=============================================="

# Ensure database is ready
echo "Checking database..."
psql {{ env.DATABASE_URL }} -c "SELECT 1" > /dev/null 2>&1 || {
  echo "Database not available. Run 'mise setup' first."
  exit 1
}

# Start backend in background
echo ""
echo "Starting backend (port 8080)..."
cd {{ env.PWD }}/backend
go run cmd/main.go serve > /tmp/backend.log 2>&1 &
BACKEND_PID=$!
echo "✓ Backend started (PID: $BACKEND_PID)"

# Start frontend in background
echo ""
echo "Starting frontend (port 3000)..."
cd {{ env.PWD }}/frontend
npm run dev > /tmp/frontend.log 2>&1 &
FRONTEND_PID=$!
echo "✓ Frontend started (PID: $FRONTEND_PID)"

echo ""
echo "=============================================="
echo "Development environment ready!"
echo ""
echo "Frontend:  http://localhost:3000"
echo "Backend:   http://localhost:8080"
echo ""
echo "Logs:"
echo "  Backend:  tail -f /tmp/backend.log"
echo "  Frontend: tail -f /tmp/frontend.log"
echo ""
echo "Press Ctrl+C to stop all services"
echo ""

# Keep running
wait
"""

[tasks."dev:backend"]
description = "Start only backend service"
run = """
set -e
cd {{ env.PWD }}/backend
echo "Starting backend on port 8080..."
go run cmd/main.go serve
"""

[tasks."dev:frontend"]
description = "Start only frontend service"
