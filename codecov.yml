coverage:
  precision: 2
  round: down
  range: "70...100"

  status:
    project:
      default:
        target: 80%
        threshold: 1%
        if_ci_failed: error
    patch:
      default:
        target: 80%
        threshold: 5%

comment:
  layout: "header, diff, files, footer"
  behavior: default
  require_changes: true

flags:
  backend:
    paths:
      - backend/
    carryforward: true
  frontend:
    paths:
      - frontend/src/
    carryforward: true

ignore:
  - "backend/cmd/**"
  - "backend/tests/**"
  - "frontend/src/test/**"
  - "frontend/e2e/**"
  - "**/*.test.*"
  - "**/*.spec.*"